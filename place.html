<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>W03 Assignment: Country Page</title>

        <meta name="description" content="WDD 131  Dynamic Web Fundamentals  Luis Quezada. This is my country page ">
        <meta name="author" content="Luis Quezada">
        <link rel="stylesheet" href="./styles/place.css">
        <link rel="stylesheet" href="./styles/place-large.css">
        <script src="./scripts/place.js" defer ></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lato:wght@100;400&display=swap" rel="stylesheet">
        
    </head>

    

    <body>
        
        <header>
            <h1 id="title">México</h1>
        </header>

        <main>

            <picture>
                <source srcset="./images/hero-mexico-large-2.webp" media="(min-width:600px)">
                <img src="./images/hero-mexico-small-2.webp" alt="Fiesta del dia de Muertos">
            </picture>

            <section class="data">
                <h2>Data</h2>

                <dl class="data-grid">
                    <dt>Area:</dt>
                    <dd>1,964,375 km²</dd>

                    <dt>Population:</dt>
                    <dd>129,739,759</dd>

                    <dt>Capital:</dt>
                    <dd>Mexico City</dd>

                    <dt>Languages:</dt>
                    <dd>Spanish</dd>

                    <dt>Currency:</dt>
                    <dd>Mexican Peso (MXN)</dd>

                    <dt>Time Zone:</dt>
                    <dd>UTC−8 to UTC−5</dd>

                    <dt>Calling Code:</dt>
                    <dd>+52</dd>

                    <dt>Internet TLD:</dt>
                    <dd>.mx</dd>
                </dl>
        

            </section>

            <section class="weather">
                <h2>Weather</h2>
                <div id="icon-container">
                    
                    <img src="./images/weather-icon.svg" alt="Weather weather-icon">
                </div>
                

                <dl class="data-grid">
                    <dt>Temperature:</dt>
                    <dd id="temperature">28 °C</dd>
                    

                    <dt>Conditions:</dt>
                    <dd>Sunny</dd>

                    <dt>Wind:</dt>
                    <dd id="wind">12 km/h</dd>

                    <dt>Wind Chill:</dt>
                    <dd id="windchill"></dd>
                </dl>
            </section>

        </main>

        <footer>
            <p>
                © <span id="currentyear"></span> ❖ Luis Quezada ❖ Qro, México
            </p>

            <p id="lastModified"></p>
        </footer>

    </body>
</html>
